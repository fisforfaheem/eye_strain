name: eye_strain
description: "An eye strain detection app using ML Kit and Firebase."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase dependencies
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  
  # ML Kit and Camera
  # google_ml_kit: ^0.19.0
  camera: ^0.11.1
  
  # State Management
  provider: ^6.1.2
  
  # UI Components
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  
  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    
  # Fonts
